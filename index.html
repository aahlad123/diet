<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriLog — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />

  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* ── Centered auth wrapper ── */
    #auth-screen {
      width: min(440px, 100%);
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Logo block ── */
    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo-icon {
      width: 64px; height: 64px;
      border-radius: 20px;
      background: linear-gradient(135deg, #0891b2, #22d3ee);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 36px rgba(6,182,212,0.38), 0 0 72px rgba(6,182,212,0.12);
      margin-bottom: 1rem;
      animation: iconPulse 3s ease-in-out infinite;
    }

    .auth-logo-icon svg {
      width: 30px; height: 30px;
      fill: #fff;
    }

    .auth-logo-name {
      display: block;
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e2e8f0 0%, #22d3ee 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .auth-logo-tagline {
      display: block;
      font-size: 0.8rem;
      color: rgba(226, 232, 240, 0.38);
      margin-top: 6px;
      letter-spacing: 0.03em;
    }

    /* ── Glass card ── */
    .auth-card {
      background: rgba(13, 22, 40, 0.72);
      border: 1px solid rgba(34, 211, 238, 0.12);
      border-radius: 24px;
      padding: 2rem 2rem 2.2rem;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 24px 80px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(34,211,238,0.06);
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(34,211,238,0.35), transparent);
    }

    /* ── Toggle ── */
    .auth-toggle {
      display: flex;
      gap: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(34,211,238,0.12);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 1.75rem;
    }

    .auth-toggle .primary-btn,
    .auth-toggle .ghost-btn {
      flex: 1;
      border-radius: 10px;
      padding: 0.65rem 0.5rem;
      font-size: 0.9rem;
      text-align: center;
      transition: all 0.2s ease;
    }

    .auth-toggle .ghost-btn {
      border: none;
      background: transparent;
      color: rgba(226,232,240,0.5);
    }

    .auth-toggle .ghost-btn:hover {
      background: rgba(34,211,238,0.06);
      color: rgba(226,232,240,0.85);
      transform: none;
      box-shadow: none;
    }

    /* ── Form heading ── */
    .form-heading {
      margin-bottom: 1.4rem;
    }

    .form-heading h2 {
      margin: 0 0 4px;
      font-size: 1.35rem;
      font-weight: 700;
      color: #fff;
    }

    .form-heading p {
      margin: 0;
      font-size: 0.82rem;
      color: rgba(241, 245, 249, 0.38);
    }

    /* ── Submit button ── */
    .auth-form > button[type="submit"] {
      width: 100%;
      margin-top: 6px;
      padding: 0.9rem;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      border-radius: 12px;
    }

    /* ── Feedback ── */
    .helper-copy { color: #f87171; min-height: 1.2em; }

    /* ── Divider ── */
    .form-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.25rem 0;
      color: rgba(241,245,249,0.18);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .form-divider::before,
    .form-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }

    /* Footer link */
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: rgba(241,245,249,0.28);
    }
  </style>
</head>
<body>

<!-- Animated background orbs -->
<div class="bg-orbs" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>

<main id="auth-screen">

  <!-- Logo -->
  <div class="auth-logo">
    <div class="auth-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    <span class="auth-logo-name">NutriLog</span>
    <span class="auth-logo-tagline">Track every meal. Hit every goal.</span>
  </div>

  <!-- Auth card -->
  <div class="auth-card">

    <!-- Login / Sign Up toggle -->
    <div class="auth-toggle">
      <button type="button" id="show-login-btn" class="primary-btn">Login</button>
      <button type="button" id="show-signup-btn" class="ghost-btn">Sign Up</button>
    </div>

    <!-- ── LOGIN ── -->
    <form id="login-form" class="auth-form">
      <div class="form-heading">
        <h2>Welcome back</h2>
        <p>Sign in to your personal nutrition tracker.</p>
      </div>

      <label>Email
        <input type="email" id="login-email" placeholder="you@example.com" required />
      </label>
      <label>Password
        <input type="password" id="login-password" placeholder="Enter your password" required />
      </label>

      <p id="login-feedback" class="helper-copy"></p>

      <button type="submit" class="primary-btn">Login</button>
    </form>

    <!-- ── SIGN UP ── -->
    <form id="signup-form" class="auth-form auth-form-hidden">
      <div class="form-heading">
        <h2>Create account</h2>
        <p>Set up your private nutrition tracker in seconds.</p>
      </div>

      <label>Email
        <input type="email" id="signup-email" placeholder="you@example.com" required />
      </label>
      <label>Password
        <input type="password" id="signup-password" placeholder="Choose a password" required />
      </label>
      <label>Confirm password
        <input type="password" id="signup-confirm-password" placeholder="Confirm your password" required />
      </label>

      <p id="signup-feedback" class="helper-copy"></p>

      <button type="submit" class="primary-btn">Create Account</button>
    </form>

  </div>

  <p class="auth-footer">Your data is private and never shared.</p>

</main>

<script src="./app.js"></script>
</body>
</html>
