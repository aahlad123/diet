services:
  - type: web
    name: diet-tracker
    runtime: node
    plan: starter
    buildCommand: "npm install"
    startCommand: "npm start"
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_DIR
        value: /var/data
    disk:
      name: diet-data
      mountPath: /var/data
      sizeGB: 1
