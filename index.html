<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriLog — Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="stylesheet" href="./styles.css" />

  <style>
    /* ── page reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ani-bg:     #080812;
      --ani-panel:  #0c0c1a;
      --ani-gold:   #ffaa20;
      --ani-blue:   #2255bb;
      --ani-text:   #dde0ee;
      --ani-border: rgba(255,255,255,0.07);
    }

    html, body {
      height: 100%;
      background: var(--ani-bg);
      color: var(--ani-text);
      font-family: 'Space Grotesk', sans-serif;
    }

    /* ── split wrapper ── */
    #auth-screen {
      display: flex;
      min-height: 100vh;
    }

    /* ═══════════════════════════════════════
       LEFT PANEL — character visual
    ═══════════════════════════════════════ */
    .char-panel {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 40px 24px 32px;
      gap: 18px;
    }

    /* background radial hint */
    .char-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 65% at 50% 48%, #ffaa2014 0%, transparent 70%),
        radial-gradient(ellipse 80% 80% at 50% 50%, #2255bb08 0%, transparent 80%);
      pointer-events: none;
    }

    /* glow orbs behind character */
    .glow-orb {
      position: absolute;
      left: 50%; top: 46%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
    }
    .go-outer {
      width: 400px; height: 500px;
      background: radial-gradient(circle, #ffaa2016 0%, transparent 70%);
      filter: blur(55px);
    }
    .go-inner {
      width: 200px; height: 270px;
      background: radial-gradient(circle, #ffaa2026 0%, transparent 65%);
      filter: blur(28px);
    }

    /* aura rings */
    .aura-ring {
      position: absolute;
      left: 50%; top: 46%;
      border-radius: 50%;
      border: 1.5px solid rgba(255,170,32,0.35);
      pointer-events: none;
      opacity: 0.5;
    }
    #ar1 { width: 240px; height: 350px; }
    #ar2 { width: 310px; height: 430px; }
    #ar3 { width: 380px; height: 520px; border-color: rgba(255,170,32,0.15); }

    /* character wrapper */
    .char-figure {
      position: relative;
      z-index: 2;
      width: 270px;
      height: 430px;
      flex-shrink: 0;
      filter:
        drop-shadow(0 0 16px rgba(255,170,32,0.45))
        drop-shadow(0 0 48px rgba(255,100,0,0.18));
    }
    .char-figure svg { width: 100%; height: 100%; overflow: visible; }

    /* branding below character */
    .char-brand {
      position: relative;
      z-index: 2;
      text-align: center;
    }
    .brand-eyebrow {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--ani-gold);
      opacity: 0.6;
      margin-bottom: 6px;
    }
    .brand-title {
      font-family: 'Black Ops One', cursive;
      font-size: 2rem;
      color: #fff;
      letter-spacing: 0.08em;
    }
    .brand-tagline {
      margin-top: 4px;
      font-size: 0.78rem;
      opacity: 0.32;
      letter-spacing: 0.03em;
    }

    /* ═══════════════════════════════════════
       RIGHT PANEL — auth form
    ═══════════════════════════════════════ */
    .form-panel {
      width: 420px;
      flex-shrink: 0;
      background: var(--ani-panel);
      border-left: 1px solid var(--ani-border);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 52px 44px;
    }

    .form-logo {
      font-family: 'Black Ops One', cursive;
      font-size: 1rem;
      color: var(--ani-gold);
      letter-spacing: 0.12em;
      margin-bottom: 36px;
    }

    /* override toggle layout */
    .auth-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }
    .auth-toggle button { flex: 1; }

    /* form heading */
    .form-heading { margin-bottom: 24px; }
    .form-heading h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .form-heading p {
      font-size: 0.82rem;
      color: rgba(221,224,238,0.45);
    }

    /* override label inside auth-form for dark theme */
    #auth-screen .auth-form label {
      display: flex;
      flex-direction: column;
      gap: 7px;
      font-size: 0.7rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: rgba(221,224,238,0.45);
      margin-bottom: 14px;
    }
    #auth-screen input[type="email"],
    #auth-screen input[type="password"],
    #auth-screen input[type="text"] {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 11px 14px;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #auth-screen input:focus {
      border-color: var(--ani-gold);
      box-shadow: 0 0 0 3px rgba(255,170,32,0.12);
    }
    #auth-screen input::placeholder { color: rgba(255,255,255,0.2); }

    /* gold-themed submit button on auth page */
    #auth-screen .primary-btn {
      background: linear-gradient(135deg, #c47800 0%, #ffaa20 100%);
      color: #080812;
      font-family: 'Black Ops One', cursive;
      letter-spacing: 0.06em;
      border-radius: 8px;
      padding: 14px;
      width: 100%;
      font-size: 0.95rem;
      margin-top: 6px;
    }
    #auth-screen .primary-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(255,170,32,0.35);
    }
    #auth-screen .ghost-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--ani-text);
      border-radius: 8px;
      padding: 13px;
    }
    #auth-screen .ghost-btn:hover {
      background: rgba(255,255,255,0.09);
      transform: translateY(-1px);
    }

    /* divider */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: rgba(221,224,238,0.2);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }

    /* feedback text */
    #auth-screen .helper-copy {
      color: #ff7070;
      font-size: 0.82rem;
      min-height: 1.2em;
    }

    /* ── responsive ── */
    @media (max-width: 780px) {
      #auth-screen   { flex-direction: column; }
      .char-panel    { min-height: 50vw; padding: 32px 16px 16px; gap: 12px; }
      .char-figure   { width: 170px; height: 270px; }
      .go-outer      { width: 260px; height: 320px; }
      .go-inner      { width: 130px; height: 170px; }
      #ar1 { width: 160px; height: 230px; }
      #ar2 { width: 210px; height: 290px; }
      #ar3 { width: 260px; height: 360px; }
      .form-panel    { width: 100%; padding: 36px 28px 44px; }
    }
  </style>
</head>
<body>

<main id="auth-screen">

  <!-- ════════════════════════════
       LEFT — Goku visual
  ════════════════════════════ -->
  <div class="char-panel">

    <div class="glow-orb go-outer"></div>
    <div class="glow-orb go-inner"></div>

    <div class="aura-ring" id="ar1"></div>
    <div class="aura-ring" id="ar2"></div>
    <div class="aura-ring" id="ar3"></div>

    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        <!-- CENTER spike (tallest) -->

        <!-- RIGHT-CENTER spike -->

        <circle  cx="127" cy="104" r="2.5"          fill="white" opacity="0.9"/>

        <!-- Eye RIGHT -->
        <ellipse cx="170" cy="106" rx="14" ry="12" fill="white"/>
        <ellipse cx="170" cy="107" rx="9"  ry="9"  fill="#1C4488"/>
        <circle  cx="170" cy="107" r="5.5"         fill="#06080E"/>
        <circle  cx="167" cy="104" r="2.5"          fill="white" opacity="0.9"/>

        <!-- Nose -->
        <path d="M144 124 Q150 133 156 124" stroke="#D4946E" stroke-width="2.5" stroke-linecap="round"/>

        <!-- Confident smirk -->
        <path d="M137 142 Q147 150 163 145" stroke="#C07050" stroke-width="2.5" stroke-linecap="round"/>

        <!-- Ears -->
        <ellipse cx="106" cy="112" rx="7" ry="11" fill="#EEB88C"/>
        <ellipse cx="194" cy="112" rx="7" ry="11" fill="#EEB88C"/>

        <!-- ══ NECK ══ -->
        <rect x="138" y="150" width="24" height="26" rx="6" fill="#F5C49E"/>

        <!-- Blue undershirt V-collar -->
        <path d="M124 176 L138 162 L150 170 L162 162 L176 176 L150 200 Z" fill="#2255BB"/>

        <!-- ══ SHOULDERS (orange gi) ══ -->
        <ellipse cx="92"  cy="192" rx="32" ry="24" fill="#E06018"/>
        <ellipse cx="208" cy="192" rx="32" ry="24" fill="#E06018"/>

        <!-- ══ TORSO ══ -->
        <path d="M106 184 Q150 168 194 184 L194 306 Q150 320 106 306 Z" fill="#E06018"/>

        <!-- Gi chest highlight -->
        <path d="M116 188 Q150 174 184 188 L182 218 Q150 226 118 218 Z" fill="#F07030" opacity="0.6"/>

        <!-- Center seam line -->
        <line x1="150" y1="182" x2="150" y2="304" stroke="#B83E08" stroke-width="2" opacity="0.4"/>

        <!-- Left gi flap shadow -->
        <path d="M106 184 L148 170 L148 304 L106 306 Z" fill="#C04000" opacity="0.18"/>

        <!-- Abs through fabric -->
        <path d="M128 232 Q150 226 172 232 L171 252 Q150 258 129 252 Z" fill="#A83000" opacity="0.24"/>
        <path d="M129 256 Q150 252 171 256 L170 276 Q150 282 130 276 Z" fill="#A83000" opacity="0.16"/>

        <!-- Blue undershirt hem at bottom -->
        <path d="M114 298 Q150 288 186 298 L186 308 Q150 318 114 308 Z" fill="#2255BB" opacity="0.45"/>

        <!-- ══ BELT / SASH ══ -->
        <path d="M106 306 Q150 320 194 306 L194 322 Q150 336 106 322 Z" fill="#CC9010"/>
        <!-- Belt knot -->
        <ellipse cx="150" cy="324" rx="16" ry="11" fill="#FFCC20"/>
        <ellipse cx="150" cy="324" rx="9"  ry="6.5" fill="#E0A010"/>
        <!-- Belt tails -->
        <path d="M138 330 Q134 348 130 364" stroke="#CC9010" stroke-width="9" stroke-linecap="round"/>
        <path d="M162 330 Q166 348 170 364" stroke="#CC9010" stroke-width="9" stroke-linecap="round"/>
        <path d="M130 360 Q130 368 128 374" stroke="#A87008" stroke-width="9" stroke-linecap="round"/>

        <!-- ══ LEFT ARM ══ -->
        <path d="M92 180 Q78 202 76 240 Q74 260 78 282" stroke="#E06018" stroke-width="26" stroke-linecap="round"/>
        <path d="M78 282 Q76 302 78 324" stroke="#F5C49E" stroke-width="22" stroke-linecap="round"/>
        <!-- Wristband -->
        <rect x="66" y="312" width="26" height="13" rx="5" fill="#2255BB"/>
        <!-- Relaxed left hand -->
        <ellipse cx="80" cy="340" rx="13" ry="16" fill="#F5C49E" transform="rotate(-6 80 340)"/>

        <path d="M81 338 Q85 352 89 356" stroke="#D4946E" stroke-width="3.5" stroke-linecap="round" opacity="0.55"/>
        <path d="M89 336 Q91 348 93 352" stroke="#D4946E" stroke-width="3"   stroke-linecap="round" opacity="0.45"/>

        <!-- ══ RIGHT ARM (slightly raised — confident) ══ -->

        <!-- Wristband -->
        <rect x="210" y="312" width="26" height="13" rx="5" fill="#2255BB"/>
        <!-- Slightly clenched right fist -->
        <rect x="210" y="326" width="28" height="22" rx="7" fill="#F5C49E"/>
        <line x1="212" y1="332" x2="236" y2="332" stroke="#D4946E" stroke-width="1.5" opacity="0.5"/>
        <line x1="212" y1="338" x2="236" y2="338" stroke="#D4946E" stroke-width="1.5" opacity="0.5"/>
        <line x1="212" y1="344" x2="236" y2="344" stroke="#D4946E" stroke-width="1.5" opacity="0.5"/>

        <!-- ══ LEGS (orange gi pants) ══ -->
        <path d="M116 322 Q108 408 106 490" stroke="#E06018" stroke-width="38" stroke-linecap="round"/>
        <path d="M184 322 Q192 408 194 490" stroke="#E06018" stroke-width="38" stroke-linecap="round"/>
        <!-- Trouser folds -->
        <path d="M108 366 Q104 380 106 390" stroke="#B83E08" stroke-width="2" stroke-linecap="round" opacity="0.38"/>
        <path d="M192 366 Q196 380 194 390" stroke="#B83E08" stroke-width="2" stroke-linecap="round" opacity="0.38"/>
        <path d="M108 418 Q104 432 106 442" stroke="#B83E08" stroke-width="2" stroke-linecap="round" opacity="0.28"/>
        <path d="M192 418 Q196 432 194 442" stroke="#B83E08" stroke-width="2" stroke-linecap="round" opacity="0.28"/>

        <!-- ══ BOOTS (blue) ══ -->
        <!-- Left boot -->
        <ellipse cx="104" cy="492" rx="26" ry="11" fill="#1E4EAA" transform="rotate(-3 104 492)"/>
        <path d="M78 490 Q104 502 130 492" fill="#1E4EAA"/>
        <ellipse cx="97" cy="492" rx="12" ry="7" fill="#122E80" transform="rotate(-3 97 492)"/>
        <path d="M84 488 Q100 494 116 488" stroke="#6688CC" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>

        <!-- Right boot -->
        <ellipse cx="196" cy="492" rx="26" ry="11" fill="#1E4EAA" transform="rotate(3 196 492)"/>
        <path d="M170 490 Q196 502 222 492" fill="#1E4EAA"/>
        <ellipse cx="203" cy="492" rx="12" ry="7" fill="#122E80" transform="rotate(3 203 492)"/>
        <path d="M184 488 Q198 494 214 488" stroke="#6688CC" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>

      </svg>
    </div>

    <div class="char-brand">
      <p class="brand-eyebrow">Personal Nutrition Intelligence</p>
      <p class="brand-title">NutriLog</p>
      <p class="brand-tagline">Track every meal. Hit every goal.</p>
    </div>

  </div><!-- /char-panel -->


  <!-- ════════════════════════════
       RIGHT — Auth form
  ════════════════════════════ -->
  <div class="form-panel">

    <p class="form-logo">NUTRILOG</p>

    <!-- Login / Sign Up toggle -->
    <div class="auth-toggle">
      <button type="button" id="show-login-btn" class="primary-btn">Login</button>
      <button type="button" id="show-signup-btn" class="ghost-btn">Sign Up</button>
    </div>

    <!-- ── LOGIN form ── -->
    <form id="login-form" class="auth-form">
      <div class="form-heading">
        <h2>Welcome back</h2>
        <p>Enter your credentials to open your tracker.</p>
      </div>

      <label>Email
        <input type="email" id="login-email" placeholder="you@example.com" required />
      </label>
      <label>Password
        <input type="password" id="login-password" placeholder="Enter password" required />
      </label>

      <p id="login-feedback" class="helper-copy"></p>

      <div class="auth-divider">or</div>

      <button type="submit" class="primary-btn">Login</button>
    </form>

    <!-- ── SIGN UP form ── -->
    <form id="signup-form" class="auth-form auth-form-hidden">
      <div class="form-heading">
        <h2>Create account</h2>
        <p>Set up your private nutrition tracker in seconds.</p>
      </div>

      <label>Email
        <input type="email" id="signup-email" placeholder="you@example.com" required />
      </label>
      <label>Password
        <input type="password" id="signup-password" placeholder="Set a password" required />
      </label>
      <label>Confirm password
        <input type="password" id="signup-confirm-password" placeholder="Confirm password" required />
      </label>

      <p id="signup-feedback" class="helper-copy"></p>

      <button type="submit" class="primary-btn">Create Account</button>
    </form>

  </div><!-- /form-panel -->

</main>

<script src="./app.js"></script>
<script>
  /* Aura ring breathing animation */
  gsap.set(['#ar1','#ar2','#ar3'], { xPercent: -50, yPercent: -50 });
  gsap.to('#ar1', { scale: 1.10, opacity: 0.80, duration: 2.2, repeat: -1, yoyo: true, ease: 'sine.inOut' });
  gsap.to('#ar2', { scale: 1.06, opacity: 0.40, duration: 2.9, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 0.8 });
  gsap.to('#ar3', { scale: 1.04, opacity: 0.20, duration: 3.6, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 1.5 });
</script>

</body>
</html>
